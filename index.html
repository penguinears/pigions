<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pigeon</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<style>
body {
  margin:0;
  overflow:hidden;
  font-family:Arial;
  background:#6fb7e9;
  touch-action:none;
}

#home {
  position:absolute;
  inset:0;
  background:#1e2a3a;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:10;
}

button {
  padding:18px 30px;
  font-size:22px;
  border-radius:12px;
  border:none;
}

#hud {
  position:absolute;
  top:10px;
  left:10px;
  color:white;
  font-size:22px;
  z-index:5;
}

canvas {
  display:block;
}
</style>
</head>

<body>

<div id="home">
  <h1>Pigeon</h1>
  <p>Keep pigeons on islands for 2 minutes</p>
  <button onclick="start()">Start</button>
</div>

<div id="hud">
  Time: <span id="time">120</span> |
  Pigeons: <span id="count">0</span>
</div>

<canvas id="c"></canvas>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

let W, H;

function resize(){
  W = c.width = window.innerWidth;
  H = c.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

// image
const pigeonImg = new Image();
pigeonImg.src = "images/pigeon.png";

// game state
let pigeons = [];
let islands = [];
let running = false;
let time = 120;
let dragging = null;

// ---------- setup ----------
function makeIslands(){
  islands = [
    {x:W*0.1, y:H*0.25, w:W*0.25, h:H*0.25},
    {x:W*0.4, y:H*0.15, w:W*0.3,  h:H*0.3},
    {x:W*0.7, y:H*0.35, w:W*0.25, h:H*0.25},
  ];
}

function spawn(x,y){
  pigeons.push({
    x,y,
    vx:(Math.random()-0.5)*2,
    vy:(Math.random()-0.5)*2
  });
}

// ---------- start ----------
function start(){
  document.getElementById("home").style.display="none";

  pigeons = [];
  time = 120;
  running = true;

  makeIslands();

  for(let i=0;i<8;i++){
    spawn(islands[0].x+80+Math.random()*100, islands[0].y+80+Math.random()*100);
  }

  last = performance.now();
  requestAnimationFrame(loop);

  setInterval(()=>{
    if(!running) return;
    time--;
    document.getElementById("time").innerText = time;
    if(time<=0) running=false;
  },1000);
}

// ---------- logic ----------
function update(){
  for(let p of pigeons){

    // flock drift (natural movement)
    p.vx += (Math.random()-0.5)*0.3;
    p.vy += (Math.random()-0.5)*0.3;

    // speed cap
    const sp = Math.hypot(p.vx,p.vy);
    if(sp>3){
      p.vx *= 3/sp;
      p.vy *= 3/sp;
    }

    if(!dragging || dragging!==p){
      p.x += p.vx;
      p.y += p.vy;
    }

    // island check
    let safe = islands.some(i =>
      p.x>i.x && p.x<i.x+i.w && p.y>i.y && p.y<i.y+i.h
    );

    // gently pull back if off islands
    if(!safe && !dragging){
      let best = islands[0];
      let bd = 1e9;

      for(let i of islands){
        let cx=i.x+i.w/2, cy=i.y+i.h/2;
        let d=Math.hypot(p.x-cx,p.y-cy);
        if(d<bd){bd=d;best=i;}
      }

      p.vx += (best.x+best.w/2 - p.x)*0.001;
      p.vy += (best.y+best.h/2 - p.y)*0.001;
    }
  }

  document.getElementById("count").innerText = pigeons.length;
}

// ---------- draw ----------
function draw(){
  ctx.fillStyle="#4aa3df";
  ctx.fillRect(0,0,W,H);

  for(let i of islands){
    ctx.fillStyle="#2f7d32";
    ctx.fillRect(i.x,i.y,i.w,i.h);

    ctx.strokeStyle="#d2b48c";
    ctx.lineWidth=12;
    ctx.strokeRect(i.x,i.y,i.w,i.h);
  }

  for(let p of pigeons){
    if(pigeonImg.complete){
      ctx.drawImage(pigeonImg, p.x-30, p.y-30, 60, 60);
    } else {
      ctx.fillStyle="white";
      ctx.beginPath();
      ctx.arc(p.x,p.y,15,0,Math.PI*2);
      ctx.fill();
    }
  }
}

// ---------- loop ----------
let last=0;
function loop(t){
  if(!running) return;

  update();
  draw();

  requestAnimationFrame(loop);
}

// ---------- MOBILE DRAG ----------
c.addEventListener("pointerdown", e=>{
  const x=e.clientX, y=e.clientY;

  dragging=null;

  for(let p of pigeons){
    if(Math.hypot(p.x-x,p.y-y)<50){
      dragging=p;
      break;
    }
  }
});

c.addEventListener("pointermove", e=>{
  if(!dragging) return;

  dragging.x = e.clientX;
  dragging.y = e.clientY;
  dragging.vx = 0;
  dragging.vy = 0;
});

c.addEventListener("pointerup", ()=>dragging=null);
</script>

</body>
</html>
