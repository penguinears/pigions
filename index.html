<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pigeon Islands</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  overflow:hidden;
  background:#6fb7e9;
  font-family:Arial;
  touch-action:none;
}

#home {
  position:absolute;
  inset:0;
  background:#1e2a3a;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:10;
}

button {
  padding:18px 30px;
  font-size:22px;
  border-radius:12px;
  border:none;
}

#hud {
  position:absolute;
  top:10px;
  left:10px;
  color:white;
  font-size:18px;
}

canvas { display:block; }
</style>
</head>

<body>

<div id="home">
  <h1>Pigeon Islands</h1>
  <p>Keep pigeon count LOW in 2 minutes</p>
  <button onclick="start()">Start</button>
</div>

<div id="hud">
  Time: <span id="time">120</span> |
  Pigeons: <span id="count">0</span>
</div>

<canvas id="c"></canvas>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

let W,H;
function resize(){
  W = c.width = innerWidth;
  H = c.height = innerHeight;
}
window.onresize = resize;
resize();

// ✅ image (your spelling kept)
const pigeonImg = new Image();
pigeonImg.src = "images/pigion.png";

// ---------- game ----------
let pigeons = [];
let islands = [];
let dragging = null;
let running = false;
let time = 120;

// ---------- islands (nice separate blobs)
function makeIslands(){
  islands = [
    {x:W*0.2,y:H*0.6,r:80},
    {x:W*0.5,y:H*0.3,r:90},
    {x:W*0.8,y:H*0.6,r:80},
  ];
}

// ---------- pigeons ----------
function spawn(x,y,child=false){
  pigeons.push({
    x,y,
    vx:0,vy:0,
    angle:0,
    child,
    age: child ? 0 : 999,
    cooldown:0
  });
}

function start(){
  document.getElementById("home").style.display="none";

  pigeons=[];
  makeIslands();
  running=true;
  time=120;

  spawn(islands[0].x, islands[0].y);
  spawn(islands[0].x+40, islands[0].y+40);
  spawn(islands[1].x, islands[1].y);
  spawn(islands[2].x, islands[2].y);

  requestAnimationFrame(loop);

  // countdown
  setInterval(()=>{
    if(!running) return;

    time--;
    document.getElementById("time").innerText = time;

    if(time <= 0){
      running = false;
      alert("Finished! Final pigeons: " + pigeons.length);
    }
  },1000);
}

// ---------- helpers ----------
function onIsland(p){
  for(let i of islands){
    if(Math.hypot(p.x-i.x, p.y-i.y) < i.r){
      return i;
    }
  }
  return null;
}

// ---------- update ----------
function update(){

  for(let p of pigeons){

    if(p.child){
      p.age++;
      if(p.age > 60*20) p.child=false;
    }

    if(p.cooldown>0) p.cooldown--;

    if(p !== dragging){
      p.vx += (Math.random()-0.5)*0.2;
      p.vy += (Math.random()-0.5)*0.2;
    }

    // limit speed
    let sp = Math.hypot(p.vx,p.vy);
    if(sp > 2){
      p.vx *= 2/sp;
      p.vy *= 2/sp;
    }

    let nx = p.x + p.vx;
    let ny = p.y + p.vy;

    // stay on island
    let island = onIsland({x:nx,y:ny});
    if(island || p===dragging){
      p.x = nx;
      p.y = ny;
    } else {
      p.vx *= -0.5;
      p.vy *= -0.5;
    }

    // face direction
    if(Math.hypot(p.vx,p.vy)>0.1){
      p.angle = Math.atan2(p.vy, p.vx);
    }
  }

  // breeding
  for(let i=0;i<pigeons.length;i++){
    for(let j=i+1;j<pigeons.length;j++){
      let a=pigeons[i], b=pigeons[j];

      if(Math.hypot(a.x-b.x, a.y-b.y) < 40 &&
         !a.child && !b.child &&
         a.cooldown===0 && b.cooldown===0){

        spawn((a.x+b.x)/2, (a.y+b.y)/2, true);

        a.cooldown = 300;
        b.cooldown = 300;
      }
    }
  }

  document.getElementById("count").innerText = pigeons.length;
}

// ---------- draw ----------
function draw(){
  ctx.fillStyle="#4aa3df";
  ctx.fillRect(0,0,W,H);

  // islands (nice circles)
  for(let i of islands){
    ctx.beginPath();
    ctx.arc(i.x,i.y,i.r,0,Math.PI*2);
    ctx.fillStyle="#3faa3f";
    ctx.fill();

    ctx.strokeStyle="#d2b48c";
    ctx.lineWidth=6;
    ctx.stroke();
  }

  // pigeons (rotate to face direction)
  for(let p of pigeons){

    if(pigeonImg.complete){
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.angle);

      let size = p.child ? 25 : 40;

      ctx.drawImage(
        pigeonImg,
        -size/2,
        -size/2,
        size,
        size
      );

      ctx.restore();
    }
  }
}

// ---------- loop ----------
function loop(){
  if(!running) return;

  update();
  draw();
  requestAnimationFrame(loop);
}

// ---------- drag ----------
c.addEventListener("pointerdown", e=>{
  let x=e.clientX, y=e.clientY;

  for(let p of pigeons){
    if(Math.hypot(p.x-x,p.y-y)<30){
      dragging=p;
      break;
    }
  }
});

c.addEventListener("pointermove", e=>{
  if(!dragging) return;

  let nx = e.clientX;
  let ny = e.clientY;

  // only allow dragging onto islands
  if(onIsland({x:nx,y:ny})){
    dragging.x = nx;
    dragging.y = ny;
  }
});

c.addEventListener("pointerup", ()=>dragging=null);

</script>
</body>
</html>
