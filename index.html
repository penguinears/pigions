<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pigeon Islands</title>
<style>
body { margin:0; overflow:hidden; font-family:Arial; background:#6fb7e9; }

#home {
  position:absolute; width:100%; height:100%;
  background:#1e2a3a; color:white;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  z-index:10;
}

button { padding:12px 20px; font-size:18px; }

#hud {
  position:absolute; top:10px; left:10px;
  color:white; font-size:18px;
}

canvas { display:block; }
</style>
</head>
<body>

<div id="home">
  <h1>Pigeon Islands</h1>
  <p>Keep pigeons low for 2 minutes</p>
  <button onclick="startGame()">Start</button>
</div>

<div id="hud">
  Time: <span id="time">120</span> |
  Pigeons: <span id="count">0</span>
</div>

<canvas id="game"></canvas>

<script>
const c=document.getElementById("game");
const ctx=c.getContext("2d");

function resize(){
  c.width=window.innerWidth;
  c.height=window.innerHeight;
}
resize(); window.onresize=resize;

let pigeons=[];
let islands=[];
let dragging=null;
let running=false;
let time=120;

function init(){
  islands=[
    {x:120,y:200,w:280,h:220},
    {x:c.width/2-150,y:120,w:300,h:240},
    {x:c.width-420,y:260,w:300,h:240}
  ];
}

function spawn(x,y,baby=true){
  pigeons.push({
    x,y,
    baby:baby,
    age:0,
    cd:Math.random()*2
  });
}

function startGame(){
  document.getElementById("home").style.display="none";
  running=true;
  time=120;
  pigeons=[];
  init();

  for(let i=0;i<4;i++){
    spawn(islands[0].x+100+i*20,islands[0].y+100,true);
  }

  setInterval(update,1000/60);
  setInterval(tick,1000);
}

function tick(){
  if(!running) return;
  time--;
  document.getElementById("time").innerText=time;
  if(time<=0) running=false;
}

function inside(p,i){
  return p.x>i.x&&p.x<i.x+i.w&&p.y>i.y&&p.y<i.y+i.h;
}

function update(){
  if(!running) return;

  pigeons.forEach(p=>{

    // grow from baby → adult
    p.age+=0.01;
    if(p.age>2) p.baby=false;

    // cooldown breeding
    if(p.cd>0) p.cd-=0.02;

    // movement ONLY if adult
    if(!p.baby && !dragging){
      p.x += (Math.random()-0.5)*2;
      p.y += (Math.random()-0.5)*2;
    }

    // breeding (COOLDOWN FIX)
    pigeons.forEach(o=>{
      if(p!==o && !p.baby && !o.baby && p.cd<=0 && o.cd<=0){
        let d=Math.hypot(p.x-o.x,p.y-o.y);
        if(d<25 && Math.random()<0.01){
          spawn(p.x+10,p.y+10,true);
          p.cd=3;
          o.cd=3;
        }
      }
    });

    // keep on islands
    let ok=false;
    islands.forEach(i=>{
      if(inside(p,i)) ok=true;
    });

    if(!ok && !dragging){
      let best=islands[0];
      let bd=99999;
      islands.forEach(i=>{
        let cx=i.x+i.w/2, cy=i.y+i.h/2;
        let d=Math.hypot(p.x-cx,p.y-cy);
        if(d<bd){bd=d;best=i;}
      });
      p.x=best.x+best.w/2;
      p.y=best.y+best.h/2;
    }
  });

  document.getElementById("count").innerText=pigeons.length;
  draw();
}

function draw(){
  ctx.fillStyle="#4aa3df";
  ctx.fillRect(0,0,c.width,c.height);

  islands.forEach(i=>{
    ctx.fillStyle="#3d8b3d";
    ctx.fillRect(i.x,i.y,i.w,i.h);

    ctx.strokeStyle="#d2b48c";
    ctx.lineWidth=12;
    ctx.strokeRect(i.x,i.y,i.w,i.h);
  });

  pigeons.forEach(p=>{
    ctx.fillStyle=p.baby?"#ddd":"white";
    ctx.beginPath();
    ctx.arc(p.x,p.y,10,0,Math.PI*2);
    ctx.fill();
  });
}

// drag FIX
c.addEventListener("pointerdown",e=>{
  pigeons.forEach(p=>{
    if(Math.hypot(p.x-e.clientX,p.y-e.clientY)<20)
      dragging=p;
  });
});

c.addEventListener("pointermove",e=>{
  if(dragging){
    dragging.x=e.clientX;
    dragging.y=e.clientY;
  }
});

c.addEventListener("pointerup",()=>dragging=null);

</script>
</body>
</html>
