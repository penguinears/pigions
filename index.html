<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pigeon Islands</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  overflow:hidden;
  background:#6fb7e9;
  font-family:Arial;
  touch-action:none;
}

#home {
  position:absolute;
  inset:0;
  background:#1e2a3a;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:10;
}

button {
  padding:18px 30px;
  font-size:22px;
  border-radius:12px;
  border:none;
}

#hud {
  position:absolute;
  top:10px;
  left:10px;
  color:white;
  font-size:20px;
}

canvas { display:block; }
</style>
</head>

<body>

<div id="home">
  <h1>Pigeon Islands</h1>
  <p>Keep pigeons LOW. They multiply if they meet!</p>
  <button onclick="start()">Start</button>
</div>

<div id="hud">
  Pigeons: <span id="count">0</span>
</div>

<canvas id="c"></canvas>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

let W,H;
function resize(){
  W = c.width = innerWidth;
  H = c.height = innerHeight;
}
window.onresize = resize;
resize();

// ✅ YOUR IMAGE (kept wrong spelling)
const pigeonImg = new Image();
pigeonImg.src = "images/pigion.png";

// ---------- game ----------
let pigeons = [];
let islands = [];
let dragging = null;
let running = false;

// ---------- islands ----------
function makeIslands(){
  islands = [
    {x:W*0.1,y:H*0.5,w:140,h:140},
    {x:W*0.4,y:H*0.3,w:160,h:160},
    {x:W*0.7,y:H*0.5,w:140,h:140},
  ];
}

// ---------- pigeons ----------
function spawn(x,y,child=false){
  pigeons.push({
    x,y,
    vx:0,vy:0,
    child:child,
    age: child ? 0 : 999,
    breedCooldown:0
  });
}

function start(){
  document.getElementById("home").style.display="none";
  pigeons=[];
  makeIslands();
  running=true;

  // 4 pigeons
  spawn(islands[0].x+50,islands[0].y+50);
  spawn(islands[0].x+90,islands[0].y+90);
  spawn(islands[1].x+60,islands[1].y+60);
  spawn(islands[2].x+60,islands[2].y+60);

  requestAnimationFrame(loop);
}

// ---------- update ----------
function update(){
  for(let p of pigeons){

    // grow child
    if(p.child){
      p.age++;
      if(p.age > 60*20) p.child=false; // 20 seconds
    }

    if(p.breedCooldown>0) p.breedCooldown--;

    // movement
    if(p !== dragging){
      p.vx += (Math.random()-0.5)*0.2;
      p.vy += (Math.random()-0.5)*0.2;

      p.x += p.vx;
      p.y += p.vy;
    }
  }

  // breeding
  for(let i=0;i<pigeons.length;i++){
    for(let j=i+1;j<pigeons.length;j++){

      let a=pigeons[i];
      let b=pigeons[j];

      let d=Math.hypot(a.x-b.x,a.y-b.y);

      if(d<40 && !a.child && !b.child &&
         a.breedCooldown===0 && b.breedCooldown===0){

        spawn((a.x+b.x)/2,(a.y+b.y)/2,true);

        a.breedCooldown = 300;
        b.breedCooldown = 300;
      }
    }
  }

  document.getElementById("count").innerText = pigeons.length;
}

// ---------- draw ----------
function draw(){
  ctx.fillStyle="#4aa3df";
  ctx.fillRect(0,0,W,H);

  // islands (cube look)
  for(let i of islands){

    // top
    ctx.fillStyle="#3faa3f";
    ctx.fillRect(i.x,i.y,i.w,i.h);

    // side
    ctx.fillStyle="#2f7d32";
    ctx.beginPath();
    ctx.moveTo(i.x, i.y+i.h);
    ctx.lineTo(i.x+20, i.y+i.h+20);
    ctx.lineTo(i.x+i.w+20, i.y+i.h+20);
    ctx.lineTo(i.x+i.w, i.y+i.h);
    ctx.fill();

    // outline
    ctx.strokeStyle="#d2b48c";
    ctx.lineWidth=6;
    ctx.strokeRect(i.x,i.y,i.w,i.h);
  }

  // pigeons (YOUR IMAGE)
  for(let p of pigeons){

    if(pigeonImg.complete){
      ctx.drawImage(
        pigeonImg,
        p.x - (p.child ? 15 : 20),
        p.y - (p.child ? 15 : 20),
        p.child ? 30 : 40,
        p.child ? 30 : 40
      );
    } else {
      // fallback
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.child?10:16,0,Math.PI*2);
      ctx.fillStyle="#fff";
      ctx.fill();
    }
  }
}

// ---------- loop ----------
function loop(){
  if(!running) return;

  update();
  draw();

  requestAnimationFrame(loop);
}

// ---------- drag ----------
c.addEventListener("pointerdown", e=>{
  let x=e.clientX, y=e.clientY;

  for(let p of pigeons){
    if(Math.hypot(p.x-x,p.y-y)<30){
      dragging=p;
      break;
    }
  }
});

c.addEventListener("pointermove", e=>{
  if(!dragging) return;

  dragging.x = e.clientX;
  dragging.y = e.clientY;
  dragging.vx = 0;
  dragging.vy = 0;
});

c.addEventListener("pointerup", ()=>dragging=null);

</script>
</body>
</html>
