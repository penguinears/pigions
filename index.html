<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sheep Islands</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  overflow:hidden;
  background:#6fb7e9;
  font-family:Arial;
  touch-action:none;
}

/* HOME SCREEN */
#home {
  position:absolute;
  inset:0;
  background:#1e2a3a;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:10;
}

#home h1 {
  font-size:70px;
  margin:0;
  letter-spacing:4px;
}

#spinSheep {
  width:160px;
  height:160px;
  animation:spin 3s linear infinite;
  margin-bottom:20px;
}

@keyframes spin {
  from { transform:rotate(0deg); }
  to { transform:rotate(360deg); }
}

button {
  padding:18px 30px;
  font-size:22px;
  border-radius:12px;
  border:none;
  cursor:pointer;
}

#hud {
  position:absolute;
  top:10px;
  left:10px;
  color:white;
  font-size:18px;
}

canvas { display:block; }
</style>
</head>

<body>

<div id="home">
  <img id="spinSheep" src="sheep.png">
  <h1>SHEEP</h1>
  <button onclick="start()">PLAY</button>
</div>

<div id="hud">
  Time: <span id="time">120</span> |
  Sheep: <span id="count">0</span>
</div>

<canvas id="c"></canvas>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

let W,H;
function resize(){
  W = c.width = innerWidth;
  H = c.height = innerHeight;
}
window.onresize = resize;
resize();

// SHEEP IMAGE
const sheepImg = new Image();
sheepImg.src = "sheep.png";

// ---------- game ----------
let sheep = [];
let islands = [];
let dragging = null;
let running = false;
let time = 120;

// ---------- RANDOM CUBE ISLANDS ----------
function makeIslands(){
  islands = [];

  for(let k=0;k<3;k++){
    let cx = W*(0.25 + 0.25*k);
    let cy = H*0.5;
    let cubes = [];

    let count = 40 + Math.floor(Math.random()*40);

    for(let i=0;i<count;i++){
      cubes.push({
        x: cx + (Math.random()*200 - 100),
        y: cy + (Math.random()*200 - 100),
        s: 20 + Math.random()*20
      });
    }

    islands.push({ cubes });
  }
}

// ---------- sheep ----------
function spawn(x,y,child=false){
  sheep.push({
    x,y,
    vx:0,vy:0,
    angle:0,
    child,
    age: child ? 0 : 999,
    cooldown:0
  });
}

function start(){
  document.getElementById("home").style.display="none";

  sheep=[];
  makeIslands();
  running=true;
  time=120;

  // spawn on island centers
  for(let isl of islands){
    let cx=0, cy=0;
    for(let c of isl.cubes){ cx+=c.x; cy+=c.y; }
    cx/=isl.cubes.length;
    cy/=isl.cubes.length;

    spawn(cx,cy);
    spawn(cx+40,cy+40);
  }

  requestAnimationFrame(loop);

  setInterval(()=>{
    if(!running) return;

    time--;
    document.getElementById("time").innerText = time;

    if(time <= 0){
      running = false;
      alert("Finished! Final sheep: " + sheep.length);
    }
  },1000);
}

// ---------- helpers ----------
function onIsland(p){
  for(let isl of islands){
    for(let c of isl.cubes){
      if(p.x > c.x-c.s/2 &&
         p.x < c.x+c.s/2 &&
         p.y > c.y-c.s/2 &&
         p.y < c.y+c.s/2){
        return true;
      }
    }
  }
  return false;
}

// ---------- update ----------
function update(){

  for(let s of sheep){

    // grow child
    if(s.child){
      s.age++;
      if(s.age > 60*20) s.child=false;
    }

    if(s.cooldown>0) s.cooldown--;

    // smoother wandering
    if(s !== dragging){
      let targetAngle = Math.random()*Math.PI*2;
      s.vx += Math.cos(targetAngle)*0.05;
      s.vy += Math.sin(targetAngle)*0.05;
    }

    // limit speed
    let sp = Math.hypot(s.vx,s.vy);
    if(sp > 1.5){
      s.vx *= 1.5/sp;
      s.vy *= 1.5/sp;
    }

    let nx = s.x + s.vx;
    let ny = s.y + s.vy;

    // stay on island OR if dragged off, snap back
    if(onIsland({x:nx,y:ny}) || s===dragging){
      s.x = nx;
      s.y = ny;
    } else {
      // bounce back toward nearest island
      s.vx *= -0.3;
      s.vy *= -0.3;
    }

    // face direction
    if(Math.hypot(s.vx,s.vy)>0.1){
      s.angle = Math.atan2(s.vy, s.vx);
    }
  }

  // breeding
  for(let i=0;i<sheep.length;i++){
    for(let j=i+1;j<sheep.length;j++){
      let a=sheep[i], b=sheep[j];

      if(Math.hypot(a.x-b.x, a.y-b.y) < 40 &&
         !a.child && !b.child &&
         a.cooldown===0 && b.cooldown===0){

        spawn((a.x+b.x)/2, (a.y+b.y)/2, true);

        a.cooldown = 300;
        b.cooldown = 300;
      }
    }
  }

  document.getElementById("count").innerText = sheep.length;
}

// ---------- draw ----------
function draw(){
  ctx.fillStyle="#4aa3df";
  ctx.fillRect(0,0,W,H);

  // cube islands
  for(let isl of islands){
    for(let c of isl.cubes){
      ctx.fillStyle="#3faa3f";
      ctx.fillRect(c.x-c.s/2, c.y-c.s/2, c.s, c.s);

      ctx.strokeStyle="#d2b48c";
      ctx.lineWidth=2;
      ctx.strokeRect(c.x-c.s/2, c.y-c.s/2, c.s, c.s);
    }
  }

  // sheep
  for(let s of sheep){
    if(sheepImg.complete){
      ctx.save();
      ctx.translate(s.x, s.y);
      ctx.rotate(s.angle);

      let size = s.child ? 25 : 40;

      ctx.drawImage(
        sheepImg,
        -size/2,
        -size/2,
        size,
        size
      );

      ctx.restore();
    }
  }
}

// ---------- loop ----------
function loop(){
  if(!running) return;

  update();
  draw();
  requestAnimationFrame(loop);
}

// ---------- drag ----------
c.addEventListener("pointerdown", e=>{
  let x=e.clientX, y=e.clientY;

  for(let s of sheep){
    if(Math.hypot(s.x-x,s.y-y)<30){
      dragging=s;
      break;
    }
  }
});

c.addEventListener("pointermove", e=>{
  if(!dragging) return;

  let nx = e.clientX;
  let ny = e.clientY;

  // only allow dragging onto islands
  if(onIsland({x:nx,y:ny})){
    dragging.x = nx;
    dragging.y = ny;
  }
});

c.addEventListener("pointerup", ()=>dragging=null);

</script>
</body>
</html>
